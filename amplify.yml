version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Amplify SSR runtimes don't get console env vars by default; write the
        # Resend key into .env.production so the Next server reads it at runtime
        # (https://docs.aws.amazon.com/amplify/latest/userguide/ssr-environment-variables.html).
        - env | grep -e RESEND_API_KEY >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
